<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ميديسنيا ERP</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0e1a; --bg2:#0f1525; --bg3:#151d30; --card:#111827;
  --border:#1e2d45; --border2:#263548;
  --text:#e2e8f4; --muted:#7a8aaa;
  --green:#00c896; --green2:#007a5c;
  --blue:#0091ff;  --red:#ff4757; --amber:#ffa502; --purple:#a855f7;
  --sidebar:240px; --topbar:56px; --r:10px;
  --font:'Cairo',sans-serif; --mono:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.6}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ── Shell ── */
#shell{display:flex;height:100vh;overflow:hidden}
#sidebar{width:var(--sidebar);background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;transition:width .2s}
#sidebar.collapsed{width:54px}
.s-logo{height:var(--topbar);display:flex;align-items:center;gap:10px;padding:0 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.s-mark{width:30px;height:30px;background:linear-gradient(135deg,var(--green),var(--green2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.s-txt{overflow:hidden;white-space:nowrap}
.s-txt .t1{font-size:13px;font-weight:700}
.s-txt .t2{font-size:10px;color:var(--muted)}
#s-nav{flex:1;overflow-y:auto;overflow-x:hidden;padding:6px 0}
.n-sec{font-size:9px;font-weight:700;letter-spacing:.07em;color:var(--muted);padding:10px 14px 3px;text-transform:uppercase;white-space:nowrap}
#sidebar.collapsed .n-sec{opacity:0}
.n-item{display:flex;align-items:center;gap:9px;padding:7px 14px;cursor:pointer;border-radius:6px;margin:1px 6px;transition:all .12s;white-space:nowrap;overflow:hidden;position:relative}
.n-item:hover{background:var(--bg3)}
.n-item.act{background:rgba(0,200,150,.12);color:var(--green)}
.n-item.act::before{content:'';position:absolute;right:0;top:4px;bottom:4px;width:3px;background:var(--green);border-radius:2px 0 0 2px}
.n-ico{font-size:15px;flex-shrink:0;width:20px;text-align:center}
.n-lbl{font-size:12px;font-weight:500}
.s-foot{padding:10px;border-top:1px solid var(--border);flex-shrink:0}

/* ── Main ── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#topbar{height:var(--topbar);background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;padding:0 16px;flex-shrink:0}
.tb-bread{flex:1;font-size:13px;font-weight:600}
.tb-bread small{color:var(--muted);font-weight:400;font-size:11px}
.tb-btn{background:var(--bg3);border:1px solid var(--border);color:var(--muted);padding:6px 11px;border-radius:6px;cursor:pointer;font-family:var(--font);font-size:12px;display:flex;align-items:center;gap:5px;transition:all .12s}
.tb-btn:hover{border-color:var(--green);color:var(--green)}
.usr-chip{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:5px 10px;cursor:pointer;transition:all .12s}
.usr-chip:hover{border-color:var(--border2)}
.usr-av{width:26px;height:26px;background:linear-gradient(135deg,var(--blue),#0055aa);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
#page{flex:1;overflow-y:auto;padding:20px}

/* ── Page Header ── */
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;gap:16px;flex-wrap:wrap}
.ph h1{font-size:20px;font-weight:700}
.ph p{font-size:12px;color:var(--muted);margin-top:2px}
.ph-act{display:flex;gap:8px;flex-shrink:0;flex-wrap:wrap}

/* ── Cards ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:14px}
.ct{font-size:13px;font-weight:700;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.sg{display:grid;gap:12px;margin-bottom:14px}
.sg2{grid-template-columns:1fr 1fr}
.sg3{grid-template-columns:1fr 1fr 1fr}
.sg4{grid-template-columns:repeat(4,1fr)}
.sc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px}
.sc .lb{font-size:11px;color:var(--muted);margin-bottom:3px}
.sc .vl{font-size:22px;font-weight:700}
.sc .sb{font-size:11px;color:var(--muted);margin-top:2px}

/* ── Forms ── */
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.req{color:var(--red)}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.fgr{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
input.inp,select.inp,textarea.inp{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:8px 11px;color:var(--text);font-family:var(--font);font-size:13px;outline:none;transition:border-color .12s;width:100%}
input.inp:focus,select.inp:focus,textarea.inp:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(0,200,150,.07)}
input.inp::placeholder,textarea.inp::placeholder{color:var(--muted)}
textarea.inp{resize:vertical;min-height:75px}
select.inp option{background:var(--card)}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:7px;border:none;cursor:pointer;font-family:var(--font);font-size:13px;font-weight:600;transition:all .12s;white-space:nowrap}
.bp{background:var(--green);color:#000}.bp:hover{background:#00e5aa;transform:translateY(-1px)}
.bs{background:var(--bg3);border:1px solid var(--border2);color:var(--text)}.bs:hover{border-color:var(--green);color:var(--green)}
.bd{background:rgba(255,71,87,.12);border:1px solid rgba(255,71,87,.3);color:var(--red)}.bd:hover{background:rgba(255,71,87,.2)}
.bg{background:transparent;border:1px solid var(--border);color:var(--muted)}.bg:hover{color:var(--text);border-color:var(--border2)}
.bsm{padding:5px 10px;font-size:11px;border-radius:5px}

/* ── Tables ── */
.tw{overflow-x:auto;border-radius:var(--r);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:var(--bg2);padding:9px 13px;text-align:right;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--border);white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:hover{background:rgba(255,255,255,.02)}
tbody tr:last-child{border-bottom:none}
td{padding:9px 13px;vertical-align:middle}

/* ── Badges ── */
.bge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap}
.bg-g{background:rgba(0,200,150,.12);color:#00c896;border:1px solid rgba(0,200,150,.3)}
.bg-r{background:rgba(255,71,87,.12);color:#ff4757;border:1px solid rgba(255,71,87,.3)}
.bg-a{background:rgba(255,165,2,.12);color:#ffa502;border:1px solid rgba(255,165,2,.3)}
.bg-b{background:rgba(0,145,255,.12);color:#0091ff;border:1px solid rgba(0,145,255,.3)}
.bg-p{background:rgba(168,85,247,.12);color:#a855f7;border:1px solid rgba(168,85,247,.3)}
.bg-m{background:rgba(122,138,170,.12);color:#7a8aaa;border:1px solid rgba(122,138,170,.3)}

/* ── Tabs ── */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:16px;gap:2px;flex-wrap:wrap}
.tab{padding:8px 15px;font-family:var(--font);font-size:12px;font-weight:600;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer;transition:all .12s;white-space:nowrap}
.tab:hover{color:var(--text)}
.tab.on{color:var(--green);border-bottom-color:var(--green)}
.tp{display:none}.tp.on{display:block}

/* ── Modal ── */
#ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(4px);z-index:2500;align-items:center;justify-content:center;padding:20px}
#ov.open{display:flex}
.modal{background:var(--card);border:1px solid var(--border2);border-radius:12px;width:100%;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.6);animation:mIn .18s ease}
@keyframes mIn{from{opacity:0;transform:translateY(14px) scale(.97)}to{opacity:1;transform:none}}
.msm{max-width:480px}.mmd{max-width:680px}.mlg{max-width:900px}
.mh{padding:15px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.mh h2{font-size:15px;font-weight:700}
.mc-btn{background:var(--bg3);border:1px solid var(--border);color:var(--muted);width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .12s}
.mc-btn:hover{border-color:var(--red);color:var(--red)}
.mb{padding:20px;overflow-y:auto;flex:1}
.mf{padding:13px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0}

/* ── Notif ── */
#nc{position:fixed;top:16px;left:16px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.nt{background:var(--card);border:1px solid var(--border2);border-radius:10px;padding:11px 15px;display:flex;align-items:center;gap:9px;min-width:260px;box-shadow:0 4px 20px rgba(0,0,0,.4);animation:nIn .25s ease;pointer-events:auto;font-size:13px}
@keyframes nIn{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:none}}

/* ── Company Screen ── */
#co-sc{display:none;position:fixed;inset:0;background:var(--bg);z-index:2000;flex-direction:column;align-items:center;justify-content:center;gap:28px;padding:20px}
#co-sc.show{display:flex}
.co-logo .mark{width:64px;height:64px;background:linear-gradient(135deg,var(--green),var(--green2));border-radius:18px;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;font-size:32px}
.co-logo h1{font-size:28px;font-weight:900;text-align:center;background:linear-gradient(135deg,var(--green),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.co-logo p{color:var(--muted);font-size:12px;text-align:center;margin-top:4px}
.co-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;width:100%;max-width:780px}
.co-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;cursor:pointer;transition:all .18s;text-align:center}
.co-card:hover{border-color:var(--green);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,200,150,.1)}
.co-av{width:48px;height:48px;border-radius:12px;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#fff}
.co-nm{font-size:14px;font-weight:700}
.co-tp{font-size:11px;color:var(--muted);margin-top:3px}

/* ── Login ── */
#lg-sc{display:none;position:fixed;inset:0;background:var(--bg);z-index:1500;align-items:center;justify-content:center}
#lg-sc.show{display:flex}
.lg-box{background:var(--card);border:1px solid var(--border2);border-radius:16px;padding:36px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.lg-box h2{font-size:19px;font-weight:700;margin-bottom:3px}
.lg-box p{color:var(--muted);font-size:12px;margin-bottom:22px}
.lg-err{color:var(--red);font-size:12px;margin-bottom:10px;display:none}

/* ── Misc ── */
.divider{border:none;border-top:1px solid var(--border);margin:14px 0}
.empty{text-align:center;padding:48px 20px;color:var(--muted)}
.empty .em{font-size:40px;margin-bottom:10px}
.empty h3{font-size:15px;font-weight:600;color:var(--text);margin-bottom:5px}
.tc{color:var(--green)}.tr{color:var(--red)}.ta{color:var(--amber)}.tb-c{color:var(--blue)}.tm{color:var(--muted)}
.fw7{font-weight:700}.fw9{font-weight:900}
.f11{font-size:11px}.f12{font-size:12px}.f13{font-size:13px}
.flex{display:flex}.col{flex-direction:column}
.ac{align-items:center}.jb{justify-content:space-between}
.g6{gap:6px}.g8{gap:8px}.g12{gap:12px}.g16{gap:16px}
.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}
code{font-family:var(--mono);font-size:12px;background:var(--bg3);padding:1px 6px;border-radius:4px;color:var(--green)}

#ai-fab{position:fixed;bottom:20px;left:20px;z-index:800;width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,var(--green),var(--green2));border:none;cursor:pointer;font-size:20px;box-shadow:0 4px 14px rgba(0,200,150,.4);transition:all .2s}
#ai-fab:hover{transform:scale(1.08)}
#ai-panel{display:none;position:fixed;bottom:76px;left:20px;width:320px;height:440px;background:var(--card);border:1px solid var(--border2);border-radius:14px;box-shadow:0 16px 48px rgba(0,0,0,.6);z-index:800;flex-direction:column;overflow:hidden}

  .n-lbl,.n-sec,.s-txt{display:none}
  .sg4{grid-template-columns:1fr 1fr}
  .sg3{grid-template-columns:1fr 1fr}
  .fg2,.fg3{grid-template-columns:1fr}
}

/* ═══════════════════════════════════════════════════════
   RESPONSIVE SYSTEM — Mobile / Tablet / Desktop
   320px  → 767px   = Mobile
   768px  → 1199px  = Tablet
   1200px+          = Desktop (default)
   ═══════════════════════════════════════════════════════ */

/* ── Overlay للـ sidebar في mobile/tablet ────────────────── */
#sb-overlay{
  display:none;
  position:fixed;inset:0;
  background:rgba(0,0,0,.5);
  z-index:999;
  backdrop-filter:blur(2px);
}
#sb-overlay.show{display:block}

/* ── Bottom nav للـ mobile ───────────────────────────────── */
#bottom-nav{
  display:none;
  position:fixed;bottom:0;left:0;right:0;
  height:58px;
  background:var(--bg2);
  border-top:1px solid var(--border2);
  z-index:900;
  flex-direction:row;
  align-items:center;
  justify-content:space-around;
  padding:0 4px;
}

/* ─────────────────────────────────────────────────────────
   TABLET  768px – 1199px
   ───────────────────────────────────────────────────────── */
@media(max-width:1199px){
  :root{ --sidebar:200px; }

  #page{ padding:16px }

  .sg4{ grid-template-columns:repeat(2,1fr) }

  .fgr{ grid-template-columns:repeat(auto-fill,minmax(180px,1fr)) }

  .ph h1{ font-size:18px }

  /* جدول — scroll أفقي */
  .tw{ overflow-x:auto }
  table{ min-width:600px }
}

/* ─────────────────────────────────────────────────────────
   MOBILE  < 768px
   ───────────────────────────────────────────────────────── */
@media(max-width:767px){
  :root{ --sidebar:260px; --topbar:50px; }

  /* ── Shell layout ─────────────────────────────────────── */
  #shell{ position:relative }

  /* Sidebar → drawer من اليمين */
  #sidebar{
    position:fixed;
    top:0;right:0;bottom:0;
    width:var(--sidebar) !important;
    transform:translateX(100%);
    transition:transform .25s cubic-bezier(.4,0,.2,1);
    z-index:1000;
    box-shadow:-4px 0 24px rgba(0,0,0,.4);
  }
  #sidebar.open{
    transform:translateX(0);
  }
  #sb-overlay.show{ display:block }

  /* Main يأخذ كامل العرض */
  #main{ width:100%; margin:0 }

  /* ── Topbar ───────────────────────────────────────────── */
  #topbar{
    padding:0 12px;
    gap:6px;
    height:var(--topbar);
  }
  /* إخفاء بعض عناصر الـ topbar */
  #topbar .tb-btn:not(:first-child):not(#alert-btn){ display:none }
  .tb-bread #tb-sec{ display:none }
  .tb-bread #tb-pg{ font-size:14px }

  /* User chip → مختصر */
  .usr-chip>div{ display:none }
  .usr-chip{ padding:4px }

  /* ── Page ─────────────────────────────────────────────── */
  #page{
    padding:12px;
    padding-bottom:70px; /* مساحة لـ bottom nav */
  }

  /* ── Page Header ──────────────────────────────────────── */
  .ph{
    flex-direction:column;
    gap:10px;
    margin-bottom:14px;
  }
  .ph h1{ font-size:17px }
  .ph-act{ width:100%; justify-content:flex-end }

  /* ── Stats Grid ───────────────────────────────────────── */
  .sg4,.sg3{ grid-template-columns:repeat(2,1fr); gap:8px }
  .sg2{ grid-template-columns:1fr 1fr; gap:8px }
  .sc{ padding:12px 14px }
  .sc .vl{ font-size:22px }

  /* ── Cards ────────────────────────────────────────────── */
  .card{ padding:14px; margin-bottom:10px }

  /* ── Forms ────────────────────────────────────────────── */
  .fgr,.fg2{ grid-template-columns:1fr }
  .inp{ font-size:16px } /* يمنع zoom في iOS */

  /* ── Tabs ─────────────────────────────────────────────── */
  .tabs{
    overflow-x:auto;
    flex-wrap:nowrap;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
    padding-bottom:2px;
  }
  .tabs::-webkit-scrollbar{ display:none }
  .tab{ white-space:nowrap; padding:8px 12px; font-size:12px }

  /* ── Table ────────────────────────────────────────────── */
  .tw{ overflow-x:auto; -webkit-overflow-scrolling:touch }
  table{ min-width:550px }
  th,td{ padding:8px 10px }

  /* ── Modal ────────────────────────────────────────────── */
  #ov{ padding:0; align-items:flex-end }
  .modal{
    border-radius:16px 16px 0 0;
    max-height:92vh;
    width:100% !important;
    max-width:100% !important;
    animation:slideUp .25s cubic-bezier(.4,0,.2,1);
  }
  .mb{ padding:16px }
  .mh{ padding:14px 16px }
  .mf{ padding:12px 16px }

  /* ── Buttons ──────────────────────────────────────────── */
  .btn{ min-height:40px }
  .btn.bsm{ min-height:34px }

  /* ── Bottom nav ───────────────────────────────────────── */
  #bottom-nav{ display:flex }
  #ai-fab{ bottom:68px }
  #ai-panel{ bottom:126px }

  /* ── Co-selector ──────────────────────────────────────── */
  .co-grid{ grid-template-columns:1fr 1fr; gap:10px }
  .co-logo h1{ font-size:24px }

  /* ── Login ────────────────────────────────────────────── */
  .lg-box{ padding:24px 20px; margin:16px }
}

/* ─────────────────────────────────────────────────────────
   SMALL MOBILE  < 380px
   ───────────────────────────────────────────────────────── */
@media(max-width:380px){
  .sg4,.sg3,.sg2{ grid-template-columns:1fr }
  .co-grid{ grid-template-columns:1fr }
  .ph h1{ font-size:15px }
}

/* ── Animation للـ modal على mobile ─────────────────────── */
@keyframes slideUp{
  from{ transform:translateY(100%) }
  to  { transform:translateY(0) }
}

.bn-item{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;flex:1;padding:6px 4px;cursor:pointer;
  color:var(--muted);transition:color .15s;
}
.bn-item:active,.bn-item.on{ color:var(--green) }
.bn-icon{ font-size:18px;line-height:1 }
.bn-lbl{ font-size:10px;font-weight:600;white-space:nowrap }
</style>
</head>
<body>

<!-- Company Selector -->
<div id="co-sc">
  <div class="co-logo">
    <div class="mark">💊</div>
    <h1>ميديسنيا ERP</h1>
    <p>نظام إدارة الشركات الدوائية المصرية — الإصدار 3.0</p>
  </div>
  <div id="co-grid" class="co-grid"></div>
  <button class="btn bp" onclick="openNewCo()">+ إنشاء شركة جديدة</button>
</div>

<!-- Login -->
<div id="lg-sc">
  <div class="lg-box">
    <h2 id="lg-co-name">تسجيل الدخول</h2>
    <p id="lg-co-type">ميديسنيا ERP</p>
    <div id="lg-err" class="lg-err"></div>
    <div class="fg" style="margin-bottom:11px">
      <label>اسم المستخدم</label>
      <input id="lg-u" class="inp" type="text" placeholder="admin" autocomplete="username">
    </div>
    <div class="fg" style="margin-bottom:18px">
      <label>كلمة المرور</label>
      <input id="lg-p" class="inp" type="password" placeholder="••••••••"
        onkeydown="if(event.key==='Enter')doLogin()">

  'companySettings','taxSettings','appUsers','auditLogs',
  'drugRegistrations','materials','materialReceipts',

  'warehouses','inventory',
  'productionOrders','batchMaterials','dispensingRecords',

function openIDB(coId){
  return new Promise((res,rej)=>{
    const req = indexedDB.open('medisniya_'+coId, 2);
    req.onerror = ()=>rej(req.error);
    req.onsuccess = ()=>{ IDB=req.result; res(IDB); };
    req.onupgradeneeded = e=>{
      const db=e.target.result;
      // Add any missing stores (handles version upgrades)
      TABLES.forEach(t=>{
        if(!db.objectStoreNames.contains(t)){
          const s=db.createObjectStore(t,{keyPath:'id',autoIncrement:true});
          if(t==='materials')        s.createIndex('name','name');
          if(t==='products')         s.createIndex('name','name');
          if(t==='materialReceipts') s.createIndex('materialId','materialId');
          if(t==='journalEntries')   s.createIndex('date','date');
          if(t==='salesInvoices')    s.createIndex('date','date');
          if(t==='employees')        s.createIndex('dept','department');
        }
      });
    };
  });
}

const dbGet = (t,id)=>new Promise((res,rej)=>{
  const r=IDB.transaction(t,'readonly').objectStore(t).get(id);
  r.onsuccess=()=>res(r.result||null); r.onerror=()=>rej(r.error);
});

const dbAll = (t,idx,q)=>new Promise((res,rej)=>{
  const tx=IDB.transaction(t,'readonly');
  const st=tx.objectStore(t);
  const r=(idx&&st.indexNames.contains(idx))?st.index(idx).getAll(q):st.getAll();
  r.onsuccess=()=>res(r.result||[]); r.onerror=()=>rej(r.error);
});

const dbIns = (t,obj)=>new Promise((res,rej)=>{
  const now=new Date().toISOString();
  const d={...obj,createdAt:obj.createdAt||now,updatedAt:now};
  const r=IDB.transaction(t,'readwrite').objectStore(t).add(d);
  r.onsuccess=()=>res({...d,id:r.result}); r.onerror=()=>rej(r.error);
});

const dbUpd = (t,obj)=>new Promise((res,rej)=>{
  const d={...obj,updatedAt:new Date().toISOString()};
  const r=IDB.transaction(t,'readwrite').objectStore(t).put(d);
  r.onsuccess=()=>res(d); r.onerror=()=>rej(r.error);
});

const dbDel = (t,id)=>new Promise((res,rej)=>{
  const r=IDB.transaction(t,'readwrite').objectStore(t).delete(id);
  r.onsuccess=()=>res(true); r.onerror=()=>rej(r.error);
});

function tryRestore(){

    if(s&&s.exp>Date.now()){ USER=s.user; hideLogin(); initApp(); }

async function doLogin(){
  const u=(document.getElementById('lg-u')?.value||'').trim();
  const p=document.getElementById('lg-p')?.value||'';
  const err=document.getElementById('lg-err');
  const show=m=>{err.textContent=m;err.style.display='block';document.getElementById('lg-p').value='';};
  if(!u||!p){show('يرجى تعبئة الحقلين');return;}
  let users=await dbAll('appUsers');
  if(!users.length){
    if(u==='admin'&&p==='admin123'){
      const h=await hashPw('admin123');
      const created=await dbIns('appUsers',{username:'admin',name:'مدير النظام',role:'admin',active:true,password:h});
      USER=created; saveSess(); hideLogin(); initApp(); return;
    }
    show('أول دخول — admin / admin123'); return;
  }
  const usr=users.find(x=>x.username===u&&x.active!==false);
  if(!usr){show('اسم المستخدم غير موجود');return;}
  if(!await verifyPw(p,usr.password)){show('كلمة المرور غير صحيحة');return;}
  USER=usr; saveSess(); hideLogin(); initApp(); err.style.display='none';
}

function saveSess(){
  try{ sessionStorage.setItem(SESS_KEY(),JSON.stringify({user:USER,exp:Date.now()+30*60*1000})); }catch{}
}

function doLogout(){
  USER=null;
  try{ sessionStorage.removeItem(SESS_KEY()); }catch{}
  showLogin();
}

async function hashPw(p){
  const enc=new TextEncoder().encode('medisniya_v3:'+p);
  const buf=await crypto.subtle.digest('SHA-256',enc);
  return 'sha256:'+[...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function verifyPw(p,stored){
  if(stored?.startsWith('sha256:')) return await hashPw(p)===stored;
  return stored===p; // legacy
}

function esc(s){
  if(s==null) return '—';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function fmt(n,d=0){
  return (Number(n)||0).toLocaleString('ar-EG',{minimumFractionDigits:d,maximumFractionDigits:d});
}
const fmtC=n=>fmt(n,2)+' ج.م';
const today=()=>new Date().toISOString().slice(0,10);

function daysDiff(dt){
  if(!dt) return null;
  return Math.floor((new Date(dt)-new Date())/86400000);
}

function expBadge(dt){
  const d=daysDiff(dt); if(d===null) return '';
  if(d<0)  return `<span class="bge bg-r">منتهية</span>`;
  if(d<30) return `<span class="bge bg-r">⚠️ ${d} يوم</span>`;
  if(d<90) return `<span class="bge bg-a">${d} يوم</span>`;
  return `<span class="bge bg-g">${d} يوم</span>`;
}

function uploadDoc(entityType, entityId, entityName, docLabel){
  if(!entityId){ notif('احفظ البيانات أولاً','error'); return; }
  const inp = ensureFileInput();

  inp.onchange = async function(){
    const file = inp.files?.[0]; if(!file) return;
    await saveDocFile(file, entityType, String(entityId), entityName||'', docLabel||file.name);
  };
  inp.click();
}

  try{
    // Compress if image
    let data, compSize;
    const isImg = file.type.startsWith('image/');
    if(isImg){
      const result = await compressImg(file);
      data=result.data; compSize=result.size;
    } else {
      data = await fileToB64(file); compSize=file.size;
    }
    const ratio = file.size>0?Math.round((1-compSize/file.size)*100):0;
    await dbIns('documents',{
      entityType:etype, entityId:eid, entityName:ename,
      docLabel, fileName:file.name, fileType:file.type||'application/octet-stream',
      originalSize:file.size, compressedSize:compSize,
      data, uploadedBy:USER?.name||'—', uploadedAt:new Date().toISOString(),
    });
    notif('✅ "'+docLabel+'" — '+fmtSz(compSize)+(ratio>5?' (وُفِّر '+ratio+'%)':''),'success');
    // Refresh any doc indicators on current page
    await refreshDocIndicators(etype, eid);
  }catch(e){
    notif('❌ '+e.message,'error');
  }
}

async function compressImg(file){
  return new Promise((res,rej)=>{
    const img=new Image(), url=URL.createObjectURL(file);
    img.onload=()=>{
      URL.revokeObjectURL(url);
      let w=img.width, h=img.height;
      const max=file.size>3e6?1200:1800;
      if(w>max){ h=Math.round(h*max/w); w=max; }
      const cv=document.createElement('canvas');
      cv.width=w; cv.height=h;
      const ctx=cv.getContext('2d');
      ctx.fillStyle='#fff'; ctx.fillRect(0,0,w,h);
      ctx.drawImage(img,0,0,w,h);
      const q=file.size>2e6?0.65:0.78;
      cv.toBlob(blob=>{
        if(!blob) return rej(new Error('Compression failed'));
        const r=new FileReader();
        r.onload=e=>res({data:e.target.result,size:blob.size});
        r.readAsDataURL(blob);
      },'image/jpeg',q);
    };
    img.onerror=()=>{ URL.revokeObjectURL(url); rej(new Error('Image load failed')); };
    img.src=url;
  });
}

function fileToB64(file){
  return new Promise((res,rej)=>{
    if(file.size>25e6){ rej(new Error('الملف أكبر من 25MB')); return; }
    const r=new FileReader();
    r.onload=e=>res(e.target.result);
    r.onerror=()=>rej(r.error);
    r.readAsDataURL(file);
  });
}

function fmtSz(b){
  if(b<1024) return b+'B';
  if(b<1e6)  return (b/1024).toFixed(1)+'KB';
  return (b/1e6).toFixed(1)+'MB';
}

async function getDocsByEntity(etype, eid){
  const all=await dbAll('documents');
  return all.filter(d=>d.entityType===etype&&d.entityId===String(eid));
}

async function viewDoc(id){
  const d=await dbGet('documents',id); if(!d){notif('غير موجود','error');return;}
  const isImg=d.fileType?.startsWith('image/');
  const isPDF=d.fileType==='application/pdf';
  openModal('👁 '+esc(d.docLabel||d.fileName),
    isImg?`<div style="text-align:center"><img src="${d.data}" style="max-width:100%;max-height:70vh;border-radius:8px"></div>`
    :isPDF?`<iframe src="${d.data}" style="width:100%;height:68vh;border:none;border-radius:8px"></iframe>`
    :`<div style="text-align:center;padding:40px"><div style="font-size:48px;margin-bottom:14px">📄</div>
      <div class="fw7">${esc(d.fileName)}</div>
      <div class="tm f12" style="margin-top:6px">${fmtSz(d.compressedSize)}</div></div>`,
    [{l:'⬇ تحميل',c:'bp',fn:`downloadDoc(${id})`}],'mlg');
}

async function downloadDoc(id){
  const d=await dbGet('documents',id); if(!d) return;
  const a=document.createElement('a'); a.href=d.data; a.download=d.fileName; a.click();
  notif('⬇ جاري التحميل','success');
}

async function deleteDoc(id, etype, eid){
  if(!confirm('حذف هذا المستند؟')) return;
  await dbDel('documents',id);
  notif('✅ تم الحذف','success');
  await refreshDocIndicators(etype, eid);
}

// ── docBadge: يُعرض بجانب label المستند ──────────────────────────
// يُستدعى لكل سطر مستند في صفحة بيانات الشركة
async function renderDocRow(containerEl, etype, eid, docLabel){
  if(!containerEl) return;
  const docs=await getDocsByEntity(etype, String(eid));
  const mine=docs.filter(d=>d.docLabel===docLabel);
  const last=mine[mine.length-1];
  if(!last){
    containerEl.innerHTML=`<button class="btn bp bsm" onclick="uploadDocWithAI('${etype}','${eid}','','${docLabel.replace(/'/g,"\\'")}')">🤖 رفع + قراءة</button>`;
  } else {
    const ratio=last.originalSize>0?Math.round((1-last.compressedSize/last.originalSize)*100):0;
    containerEl.innerHTML=
      `<div class="flex ac g6">
        <span class="bge bg-g" style="font-size:10px">✅ ${fmtSz(last.compressedSize)}${ratio>5?' −'+ratio+'%':''}</span>
        <button class="btn bs bsm" onclick="viewDoc(${last.id})">👁</button>
        <button class="btn bp bsm" onclick="uploadDoc('${etype}','${eid}','','${docLabel.replace(/'/g,"\\'")}')">🔄</button>
        <button class="btn bd bsm" onclick="deleteDoc(${last.id},'${etype}','${eid}')">✕</button>
      </div>`;
  }
}

// تحديث كل أزرار المستندات في الصفحة الحالية
async function refreshDocIndicators(etype, eid){
  document.querySelectorAll('[data-doc-row]').forEach(async el=>{
    if(el.dataset.etype===etype && el.dataset.eid===String(eid)){
      await renderDocRow(el, etype, eid, el.dataset.label);
    }
  });
}

// ── Helpers for company-info ───────────────────────────────────────
let _partners=[],_directors=[],_tollFactories=[],_tollStorages=[],_regDists=[],_prodLines=[];

function updateArr(arr,i,key,val){
  const a=window[arr]; if(a&&a[i]) a[i][key]=val;
}
function removeArr(arr,i,refreshFn){
  const a=window[arr]; if(a){ a.splice(i,1); if(refreshFn)refreshFn(); }
}

function partnerRowHtml(p,i){
  return `<tr>
    <td><input class="inp" value="${esc(p.name||'')}" onchange="if(!_partners[${i}])_partners[${i}]={};_partners[${i}].name=this.value"></td>
    <td><input class="inp" style="width:80px" value="${esc(p.nationality||'مصري')}" onchange="_partners[${i}].nationality=this.value"></td>
    <td><input class="inp" type="number" style="width:80px" value="${p.shares||0}" onchange="_partners[${i}].shares=+this.value;calcPartnerTotals()"></td>
    <td><input class="inp" type="number" style="width:100px" value="${p.value||0}" onchange="_partners[${i}].value=+this.value"></td>
    <td><input class="inp" type="number" step="0.01" style="width:70px" value="${p.pct||0}" onchange="_partners[${i}].pct=+this.value;calcPartnerTotals()"></td>
    <td><select class="inp" style="width:100px" onchange="_partners[${i}].currency=this.value">
      <option ${(p.currency||'جنيه مصري')==='جنيه مصري'?'selected':''}>جنيه مصري</option>
      <option ${p.currency==='دولار أمريكي'?'selected':''}>دولار أمريكي</option>
    </select></td>
    <td><button class="btn bd bsm" onclick="_partners.splice(${i},1);refreshPartners()">✕</button></td>
  </tr>`;
}

function directorRowHtml(d,i){
  return `<tr>
    <td><input class="inp" value="${esc(d.name||'')}" onchange="_directors[${i}].name=this.value"></td>
    <td><input class="inp" style="width:80px" value="${esc(d.nationality||'مصري')}" onchange="_directors[${i}].nationality=this.value"></td>
    <td><select class="inp" onchange="_directors[${i}].role=this.value">
      ${['مدير عام','مدير تنفيذي','مدير إداري','رئيس مجلس الإدارة','شريك مدير'].map(v=>`<option ${d.role===v?'selected':''}>${v}</option>`).join('')}
    </select></td>
    <td><select class="inp" onchange="_directors[${i}].sigAuth=this.value">
      <option ${(d.sigAuth||'منفرد')==='منفرد'?'selected':''}>منفرداً</option>
      <option ${d.sigAuth==='مشترك'?'selected':''}>مجتمعاً</option>
    </select></td>
    <td><button class="btn bd bsm" onclick="_directors.splice(${i},1);refreshDirectors()">✕</button></td>
  </tr>`;
}

function calcPartnerTotals(){
  const total=_partners.reduce((s,p)=>s+(+p.pct||0),0);
  const el=document.getElementById('partners-totals');
  if(el) el.innerHTML=`إجمالي نسبة المشاركة: <strong class="${Math.abs(total-100)<0.01?'tc':'tr'}">${total.toFixed(2)}%</strong> ${Math.abs(total-100)<0.01?'✅':'⚠️ يجب أن يكون 100%'}`;
}

function addPartnerRow(){ _partners.push({name:'',nationality:'مصري',shares:0,value:0,pct:0,currency:'جنيه مصري'}); refreshPartners(); }
function addDirectorRow(){ _directors.push({name:'',nationality:'مصري',role:'مدير عام',sigAuth:'منفرد'}); refreshDirectors(); }
function addTollFactory(){ _tollFactories.push({name:'',address:'',products:''}); refreshTollFactories(); }
function addTollStorage(){ _tollStorages.push(''); refreshTollStorages(); }
function addRegDist(){ _regDists.push({name:'',address:''}); refreshRegDists(); }
function addProductionLine(){ _prodLines.push({form:'tablet',notes:'',addedDate:''}); refreshProdLines(); }

  const tb=document.getElementById('partners-body'); if(!tb)return;
  tb.innerHTML=_partners.map((p,i)=>partnerRowHtml(p,i)).join('');

function toggleMfgType(type){
  const toll=document.getElementById('ci-toll-section');
  const own=document.getElementById('ci-own-factory');
  const msg=document.getElementById('ci-no-factory-msg');
  if(toll) toll.style.display=(type==='toll'||type==='both')?'block':'none';
  if(own)  own.style.display=(type==='own'||type==='both')?'block':'none';
  if(msg)  msg.style.display=(type==='toll')?'block':'none';
}

function renderLicAlerts(s){
  const items=[
    {l:'السجل التجاري',    exp:s.commercialRegExpiry},
    {l:'البطاقة الضريبية',  exp:s.taxCardExpiry},
    {l:'ترخيص EDA',         exp:s.edaLicenseExpiry},
    {l:'شهادة GMP',         exp:s.gmpLicenseExpiry},
    {l:'رخصة المصنع',       exp:s.factoryLicenseExpiry},
  ];
  const rows=items.filter(i=>i.exp).map(i=>`
    <div class="flex ac jb" style="padding:7px 0;border-bottom:1px solid var(--border)">
      <span class="f13">${i.l}</span>
      <div class="flex ac g8"><span class="tm f12">${i.exp}</span>${expBadge(i.exp)}</div>
    </div>`);
  return rows.length?rows.join(''):'<div class="tm f12">لم يتم إدخال تواريخ الانتهاء بعد</div>';
}

async function saveCoInfo(){
  const v=id=>document.getElementById(id)?.value?.trim()||'';
  const mtype=document.querySelector('input[name="mfg-type"]:checked')?.value||'toll';
  const d={
    nameAr:v('ci-nar'), nameEn:v('ci-nen'), legalName:v('ci-legalname'),
    legalForm:v('ci-lf'), foundedDate:v('ci-found'), capitalPaid:v('ci-cap'),
    fiscalStart:v('ci-fy'), activityType:v('ci-atype'),
    companyPurpose:document.getElementById('ci-purpose')?.value?.trim()||'',
    commercialRegNo:v('ci-cr'), commercialRegUnified:v('ci-cr-unified'),
    commercialRegStart:v('ci-cr-start'), commercialRegExpiry:v('ci-crexp'),
    commercialRegIssuer:v('ci-cr-issuer'), commercialRegFile:v('ci-cr-file'),
    taxRegNo:v('ci-trn'), taxCardNo:v('ci-tax-card'), taxOffice:v('ci-tax-office'),
    activityCode:v('ci-act-code'), taxStartDate:v('ci-tax-start'),
    taxCardExpiry:v('ci-tax-exp'), incomeTaxRegNo:v('ci-itr'), importRegNo:v('ci-imp'),
    socialInsuranceNo:v('ci-si'), mainBank:v('ci-bank'), auditorName:v('ci-aud'),
    etaRegistered:v('ci-eta')==='yes',
    partners:_partners, directors:_directors, mfgType:mtype,
    edaLicenseNo:v('ci-eda'), edaLicenseType:v('ci-edatype'),
    edaFirstLicenseDate:v('ci-eda-first'), edaLicenseExpiry:v('ci-edaexp'),
    qualifiedPerson:v('ci-qp'), qpRegNo:v('ci-qpreg'), qpMohNo:v('ci-qp-moh'),
    technicalConsultant:v('ci-technical'),
    tollFactories:_tollFactories, tollStorages:_tollStorages,
    registeredDistributors:_regDists,
    factoryName:v('ci-fac-name')||'', factoryLicenseNo:v('ci-fac-lic')||'',
    factoryFirstLicense:v('ci-fac-first')||'', factoryAddress:v('ci-fac-addr')||'',
    factoryCity:v('ci-fac-city')||'', gmpLicenseNo:v('ci-gmp')||'',
    gmpLicenseExpiry:v('ci-gmpexp')||'', gmpAuthority:v('ci-gmpauth')||'',
    siteManager:v('ci-site-mgr')||'', siteMgrSynNo:v('ci-site-mgr-syn')||'',
    siteMgrMohNo:v('ci-site-mgr-moh')||'', qcManager:v('ci-qc-mgr')||'',
    qcMgrSynNo:v('ci-qc-syn')||'', qcMgrMohNo:v('ci-qc-moh')||'',
    productionManager:v('ci-prod-mgr')||'', prodMgrSynNo:v('ci-prod-syn')||'',
    productionLines:_prodLines,
    address:v('ci-addr'), governorate:v('ci-gov'), city:v('ci-city'),
    phone:v('ci-phone'), fax:v('ci-fax'), email:v('ci-email'), website:v('ci-web'),
  };
  if(!d.nameAr){notif('يرجى كتابة الاسم التجاري','error');return;}
  const ex=await dbAll('companySettings');
  if(ex.length) await dbUpd('companySettings',{...ex[0],...d});

async function saveDrugReg(id){
  const prodId=+document.getElementById('dr-prod')?.value||null;
  const num=(document.getElementById('dr-num')?.value||'').trim();
  if(!prodId||!num){notif('يرجى: المنتج + رقم التسجيل','error');return;}
  const prods=await dbAll('products');
  const p=prods.find(x=>x.id===prodId);
  const d={productId:prodId,productName:p?.name||'',registrationNumber:num,
    authority:document.getElementById('dr-auth')?.value||'EDA مصر',
    regType:document.getElementById('dr-type')?.value||'',
    registrationDate:document.getElementById('dr-date')?.value||today(),
    expiryDate:document.getElementById('dr-exp')?.value||'',
    dossierNo:document.getElementById('dr-dos')?.value?.trim()||'',
    status:document.getElementById('dr-st')?.value||'active',
    notes:document.getElementById('dr-notes')?.value?.trim()||''};
  if(id) await dbUpd('drugRegistrations',{...d,id});
  else   await dbIns('drugRegistrations',d);
  await logAudit(id?'تعديل':'إضافة','drugRegistrations',id||null,num);
  closeModal(); notif('✅ تم الحفظ','success');
  PAGES['drug-reg']();
}

async function delDrugReg(id){
  if(!confirm('حذف هذا التسجيل؟')) return;
  await dbDel('drugRegistrations',id);
  notif('✅ تم الحذف','success');
  PAGES['drug-reg']();
}

PAGES['diagnostics']=async function(){
  setPage(`
    <div class="ph">
      <div><h1>فحص النظام</h1><p>System Diagnostics</p></div>
      <div class="ph-act"><button class="btn bp" onclick="go('diagnostics')">إعادة الفحص</button></div>
    </div>
    <div id="diag-out"><div class="tm f12">⏳ جاري الفحص...</div></div>`);
  const tests=[
    {l:'قاعدة البيانات (IndexedDB)',run:async()=>({ok:!!IDB,msg:IDB?'متصلة':'غير متصلة'})},
    {l:'جدول المستندات',run:async()=>{
      try{ await dbAll('documents'); return {ok:true,msg:'جاهز لرفع المستندات'}; }
      catch(e){ return {ok:false,msg:'❌ '+e.message+' — أعد تحميل الصفحة',link:'diagnostics'}; }
    }},
    {l:'بيانات الشركة',run:async()=>{
      const s=(await dbAll('companySettings'))[0];
      const ok=!!(s?.nameAr&&s?.edaLicenseNo);
      return {ok,msg:ok?'البيانات مكتملة':'ناقصة',link:'company-info'};
    }},
    {l:'دليل الحسابات',run:async()=>{ const c=(await dbAll('chartOfAccounts')).length; return {ok:c>=40,msg:c+' حساب'}; }},
    {l:'التسجيلات الدوائية',run:async()=>{
      const regs=await dbAll('drugRegistrations');
      const exp=regs.filter(r=>{ const d=daysDiff(r.expiryDate); return d!==null&&d<0; }).length;
      return {ok:exp===0,msg:exp?exp+' منتهية':regs.length+' تسجيل سليم',link:exp?'drug-reg':null};
    }},
    {l:'مستخدم admin',run:async()=>{ const ok=(await dbAll('appUsers')).some(u=>u.role==='admin'&&u.active!==false); return {ok,msg:ok?'نشط':'غير موجود'}; }},
  ];
  const res=await Promise.all(tests.map(async t=>({...t,...(await t.run())})));
  const passed=res.filter(r=>r.ok).length;
  const pct=Math.round(passed/res.length*100);
  const el=document.getElementById('diag-out'); if(!el) return;
  el.innerHTML=`
    <div class="card" style="margin-bottom:14px">
      <div class="flex jb ac mb8"><span class="fw7">صحة النظام</span>
        <span class="fw9" style="font-size:22px;color:${pct===100?'var(--green)':pct>=60?'var(--amber)':'var(--red)'}">${pct}%</span></div>
      <div style="height:6px;background:var(--bg3);border-radius:3px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:${pct===100?'var(--green)':pct>=60?'var(--amber)':'var(--red)'};border-radius:3px;transition:.5s"></div>
      </div>
    </div>
    <div class="card">
      ${res.map(r=>`<div class="flex ac jb" style="padding:9px 0;border-bottom:1px solid var(--border)">
        <div><div class="flex ac g8 mb8"><span>${r.ok?'✅':'❌'}</span><span class="fw7 f13">${r.l}</span></div>
        <div class="tm f12">${r.msg}</div></div>
        ${r.link&&!r.ok?`<button class="btn bs bsm" onclick="go('${r.link}')">إصلاح</button>`:''}
      </div>`).join('')}
    </div>`;
};

// ── الدالة الرئيسية: رفع + قراءة AI ──────────────────────────────
function uploadDocWithAI(entityType, entityId, entityName, docLabel){
  if(!entityId){ notif('احفظ البيانات أولاً','error'); return; }

  const extractConfig = DOC_EXTRACT_MAP[entityType]?.[docLabel];
  const inp = ensureFileInput();
  inp.value = '';
  inp.onchange = async function(){
    const file = inp.files?.[0]; if(!file) return;
    if(extractConfig){
      await processDocWithAI(file, entityType, String(entityId), entityName||'', docLabel, extractConfig);
    } else {
      // لو مفيش config للاستخراج — حفظ عادي
      await saveDocFile(file, entityType, String(entityId), entityName||'', docLabel);
    }
  };
  inp.click();
}

async function processDocWithAI(file, etype, eid, ename, docLabel, config){
  // ── Show progress modal ──────────────────────────────────────
  openModal(`🤖 قراءة "${docLabel}"`,
    `<div style="text-align:center;padding:20px 0">
      <div id="ai-read-status">
        <div style="font-size:36px;margin-bottom:14px;animation:spin 1s linear infinite">⟳</div>
        <div class="fw7" style="font-size:14px">جاري معالجة المستند...</div>
        <div class="tm f12" style="margin-top:6px" id="ai-read-step">ضغط وتجهيز الملف</div>
      </div>
      <div id="ai-read-result" style="display:none"></div>
    </div>`,
    [], 'mmd'
  );

  const setStep = (msg) => {
    const el = document.getElementById('ai-read-step');
    if(el) el.textContent = msg;
  };

  try{
    // ── Step 1: Compress if image ──────────────────────────────
    setStep('ضغط وتجهيز الملف...');
    const isImg = file.type.startsWith('image/');
    let b64data, mediaType;

    if(isImg){
      const comp = await compressImg(file);
      b64data   = comp.data.split(',')[1];
      mediaType = 'image/jpeg';
    } else if(file.type === 'application/pdf'){
      const raw = await fileToB64(file);
      b64data   = raw.split(',')[1];
      mediaType = 'application/pdf';
    } else {
      // Office files — نحفظهم بدون AI
      notif('⚠️ هذا النوع لا يدعم القراءة التلقائية — سيتم الحفظ عادياً','info');
      closeModal();
      await saveDocFile(file, etype, eid, ename, docLabel);
      return;
    }

    // ── Step 2: Call Claude API ────────────────────────────────
    setStep('إرسال لـ Claude AI للقراءة...');

    const contentBlock = isImg
      ? { type:'image', source:{ type:'base64', media_type:mediaType, data:b64data } }
      : { type:'document', source:{ type:'base64', media_type:'application/pdf', data:b64data } };

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: [
            contentBlock,
            { type:'text', text: config.prompt }
          ]
        }]
      })
    });

    if(!response.ok){
      const err = await response.json().catch(()=>({}));
      throw new Error(err?.error?.message || `API Error ${response.status}`);
    }

    // ── Step 3: Parse response ─────────────────────────────────
    setStep('تحليل البيانات المستخرجة...');
    const data = await response.json();
    const text = data.content?.find(c=>c.type==='text')?.text || '';

    // استخرج JSON من الرد
    let extracted = {};
    const jsonMatch = text.match(/\{[\s\S]*\}/);
    if(jsonMatch){
      try{ extracted = JSON.parse(jsonMatch[0]); }
      catch(e){ throw new Error('تعذّر تحليل رد AI — ' + e.message); }
    } else {
      throw new Error('لم يرجع AI بيانات منظمة');
    }

    // ── Step 4: Save file ──────────────────────────────────────
    setStep('حفظ الملف...');
    await saveDocFile(file, etype, eid, ename, docLabel);

    // ── Step 5: Show extracted data for review ─────────────────
    const statusEl = document.getElementById('ai-read-status');
    const resultEl = document.getElementById('ai-read-result');
    if(statusEl) statusEl.style.display = 'none';
    if(resultEl){
      resultEl.style.display = 'block';

      // بناء HTML للمراجعة
      const labels = config.labels || {};
      const fields = Object.entries(extracted).filter(([k,v])=>
        v && v !== '' && !Array.isArray(v) && typeof v !== 'object'
      );
      const arrFields = Object.entries(extracted).filter(([k,v])=>
        Array.isArray(v) && v.length > 0
      );

      let html = `<div style="text-align:right">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
          <span style="font-size:20px">✅</span>
          <div>
            <div class="fw7">تم استخراج البيانات بنجاح</div>
            <div class="tm f12">راجع البيانات وموافق على التعبئة التلقائية</div>
          </div>
        </div>
        <div style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px;max-height:280px;overflow-y:auto">`;

      fields.forEach(([key, val]) => {
        if(!val) return;
        html += `<div class="flex ac jb" style="padding:6px 0;border-bottom:1px solid var(--border)">
          <span class="f12 tm">${labels[key]||key}</span>
          <span class="f12 fw7" style="max-width:60%;text-align:left;direction:ltr">${String(val)}</span>
        </div>`;
      });

      if(arrFields.length){
        arrFields.forEach(([key, arr]) => {
          html += `<div style="padding:6px 0;border-bottom:1px solid var(--border)">
            <div class="f12 tm mb8">${labels[key]||key}: <strong>${arr.length} عناصر</strong></div>`;
          arr.forEach(item => {
            if(typeof item === 'object'){
              html += `<div style="font-size:11px;color:var(--text2);padding:2px 0">${Object.values(item).filter(Boolean).join(' — ')}</div>`;
            }
          });
          html += '</div>';
        });
      }

      html += `</div></div>`;
      resultEl.innerHTML = html;

      // تحديث الـ footer buttons
      const foot = document.getElementById('m-foot');
      if(foot){
        foot.style.display = 'flex';
        foot.innerHTML = `
          <button class="btn bp" onclick="applyExtractedData(${JSON.stringify(extracted).replace(/"/g,'&quot;')}, '${etype}', '${eid}')">
            ✅ تعبئة الحقول تلقائياً
          </button>
          <button class="btn bs" onclick="closeModal()">تجاهل — حفظ المستند فقط</button>`;
      }

      // حفظ البيانات المستخرجة للاستخدام لاحقاً
      window._lastExtracted = { data: extracted, etype, eid };
    }

  } catch(err){
    const statusEl = document.getElementById('ai-read-status');
    if(statusEl){
      statusEl.innerHTML = `<div style="font-size:32px;margin-bottom:12px">⚠️</div>
        <div class="fw7 tr">فشل في القراءة التلقائية</div>
        <div class="tm f12" style="margin-top:6px">${esc(err.message)}</div>
        <div class="f12" style="margin-top:10px">تم حفظ المستند — يمكنك إدخال البيانات يدوياً</div>`;
    }
    // حفظ الملف حتى لو فشل AI
    await saveDocFile(file, etype, eid, ename, docLabel).catch(()=>{});
    const foot = document.getElementById('m-foot');
    if(foot){ foot.style.display='flex'; foot.innerHTML=`<button class="btn bs" onclick="closeModal()">إغلاق</button>`; }
  }
}

// ── تطبيق البيانات المستخرجة على الحقول ──────────────────────────
async function applyExtractedData(extracted, etype, eid){
  closeModal();

  // Field ID mapping — حقول الـ company-info
  const fieldMap = {
    // السجل التجاري
    commercialRegNo:      'ci-cr',
    commercialRegUnified: 'ci-cr-unified',
    commercialRegStart:   'ci-cr-start',
    commercialRegExpiry:  'ci-crexp',
    commercialRegFile:    'ci-cr-file',
    // البطاقة الضريبية
    taxRegNo:             'ci-trn',
    taxCardNo:            'ci-tax-card',
    taxOffice:            'ci-tax-office',
    activityCode:         'ci-act-code',
    taxStartDate:         'ci-tax-start',
    taxCardExpiry:        'ci-tax-exp',
    // الشركة الأساسية
    nameAr:               'ci-nar',
    legalName:            'ci-legalname',
    legalForm:            'ci-lf',
    capitalPaid:          'ci-cap',
    companyPurpose:       'ci-purpose',
    foundedDate:          'ci-found',
    address:              'ci-addr',
    // EDA
    edaLicenseNo:         'ci-eda',
    edaLicenseType:       'ci-edatype',
    edaFirstLicenseDate:  'ci-eda-first',
    qualifiedPerson:      'ci-qp',
    // المصنع
    factoryLicenseNo:     'ci-fac-lic',
    factoryName:          'ci-fac-name',
    factoryAddress:       'ci-fac-addr',
    factoryFirstLicense:  'ci-fac-first',
    siteManager:          'ci-site-mgr',
    siteMgrSynNo:         'ci-site-mgr-syn',
    siteMgrMohNo:         'ci-site-mgr-moh',
    qcManager:            'ci-qc-mgr',
    qcMgrSynNo:           'ci-qc-syn',
    qcMgrMohNo:           'ci-qc-moh',
    productionManager:    'ci-prod-mgr',
    prodMgrSynNo:         'ci-prod-syn',
    // التسجيل الدوائي
    registrationNumber:   'dr-num',
    productName:          null, // handled separately
    registrationDate:     'dr-date',
    expiryDate:           'dr-exp',
    dossierNo:            'dr-dos',
    // CoA
    batchNumber:          'grn-lot',
    mfgDate:              'grn-mfg',
    supplier:             'grn-sup',
    coaLab:               'grn-coalab',
  };

  let filled = 0;
  let skipped = [];

  Object.entries(extracted).forEach(([key, val]) => {
    if(!val || Array.isArray(val) || typeof val === 'object') return;
    const elId = fieldMap[key];
    if(!elId) return;
    const el = document.getElementById(elId);
    if(!el){ skipped.push(key); return; }
    // تعبئة الحقل
    if(el.tagName === 'SELECT'){
      // محاولة مطابقة الـ value أو الـ text
      const opts = Array.from(el.options);
      const match = opts.find(o=>
        o.value.includes(String(val)) ||
        String(val).includes(o.value) ||
        o.text.includes(String(val))
      );
      if(match){ el.value = match.value; filled++; }
    } else {
      el.value = String(val);
      filled++;
      // trigger animation
      el.style.background = 'rgba(0,200,150,.1)';
      setTimeout(()=>{ el.style.background=''; }, 1500);
    }
  });

  // معالجة الـ arrays (partners, directors)
  if(extracted.partners && Array.isArray(extracted.partners) && extracted.partners.length){
    _partners = extracted.partners.map(p=>({
      name:        p.name||'',
      nationality: p.nationality||'مصري',
      shares:      +p.shares||0,
      value:       +p.value||0,
      pct:         +p.pct||0,
      currency:    'جنيه مصري'
    }));
    refreshPartners();
    filled++;
  }

  if(extracted.directors && Array.isArray(extracted.directors) && extracted.directors.length){
    _directors = extracted.directors.map(d=>({
      name:    d.name||'',
      nationality:'مصري',
      role:    d.role||'مدير عام',
      sigAuth: d.sigAuth||'منفرد'
    }));
    refreshDirectors();
    filled++;
  }

  // المصانع المتعاقدة (tollFactories)
  if(extracted.tollFactories && typeof extracted.tollFactories === 'string'){
    const factories = extracted.tollFactories.split(/[،,]/).map(f=>f.trim()).filter(Boolean);
    _tollFactories = factories.map(name=>({name,address:'',products:''}));
    refreshTollFactories();
    filled++;
  }

  notif(`✅ تم تعبئة ${filled} حقل تلقائياً${skipped.length?' — '+skipped.length+' حقل خارج الصفحة الحالية':''}`, 'success');
}
